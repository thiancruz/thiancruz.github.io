<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
    <style>
        body {
            background-color: #ADD8E6; /* Light blue background */
            font-family: Arial, sans-serif;
        }
        h1, h2, h3 {
            color: #FF4500; /* Strong color for headings */
            font-size: 2.5em; /* Large font size */
            font-weight: bold;
            text-shadow: 2px 2px #FFFFFF; /* Eye-catching text styling */
        }
        p {
            color: #2E8B57; /* Vibrant text color */
            font-size: 1.5em; /* Large font size */
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Page!</h1>
    <h2>Discover Amazing Content</h2>
    <p>This is an example page with a vibrant design!</p>
</body>
</html>
